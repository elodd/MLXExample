name: QtLlamaSwiftUI
options:
  bundleIdPrefix: com.eloddobos
  deploymentTarget:
    iOS: "17.0"
packages:
  MLXQtBridge:
    path: ../MLXQtBridge
targets:
  QtLlamaSwiftUI:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - path: ../Assets.xcassets
      - path: ../PrivacyInfo.xcprivacy
    dependencies:
      - package: MLXQtBridge
        product: MLXQtBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eloddobos.qtllama.swiftui
        PRODUCT_NAME: QtLlama
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Qt Llama
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: 6.0
        ENABLE_BITCODE: NO
        CODE_SIGN_STYLE: Automatic
schemes:
  QtLlamaSwiftUI:
    build:
      targets:
        QtLlamaSwiftUI: all
    run:
      config: Debug
